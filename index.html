<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey Rent A Car</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 3;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    a {
      padding: 14px 28px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 40px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="hero-logo.mp4" type="video/mp4" />
    </video>

    <div class="overlay"></div>

    <div class="content">
      <h1>Journey Rent A Car</h1>
      <p>Luxury rentals made simple.</p>
      <a href="#fleet">View Fleet</a>
    </div>
  </section>
</body>
</html>
